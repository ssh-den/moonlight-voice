name: Moonlight Voice
version: 1.4.2
slug: moonlight-voice
description: Local deterministic audio-response service for Home Assistant, maintained by ssh-den
arch:
  - amd64
  - armv7
  - aarch64
startup: services
boot: auto
init: false
ports:
  8031/tcp: 8031
ports_description:
  8031/tcp: Direct local API (not required for Supervisor discovery)
ingress: true
ingress_port: 8031
hassio_api: true
discovery:
  - moonlight_voice
map:
  - config:rw
  - share:rw
options:
  output_file: default.mp3
  log_level: info
  cache_headers: false
  max_upload_size_mb: 20
  port: 8031
schema:
  output_file: str
  log_level: list(debug|info|warn|error)
  cache_headers: bool
  max_upload_size_mb: int
  port: int
