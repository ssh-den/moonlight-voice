name: Create release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix (for example, 1.1.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Tag and publish release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require the default branch
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]]; then
            echo "Run this workflow from $DEFAULT_BRANCH, not $GITHUB_REF_NAME."
            exit 1
          fi

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Version must use SemVer form, such as 1.1.0 or 1.1.0-rc.1."
            exit 1
          fi

          tag="v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists."
            exit 1
          fi

          addon_version="$(sed -nE 's/^version:[[:space:]]*([^[:space:]]+)[[:space:]]*$/\1/p' moonlight-voice/config.yaml)"
          service_version="$(sed -nE 's/^SERVICE_VERSION = "([^"]+)"$/\1/p' moonlight-voice/moonlight_voice/config.py)"
          integration_version="$(python3 -c 'import json; print(json.load(open("custom_components/moonlight_voice/manifest.json", encoding="utf-8"))["version"])')"

          for current_version in "$addon_version" "$service_version" "$integration_version"; do
            if [[ "$current_version" != "$VERSION" ]]; then
              echo "All release versions must equal $VERSION."
              exit 1
            fi
          done

          if ! cmp -s CHANGELOG.md moonlight-voice/CHANGELOG.md; then
            echo "The root and add-on changelogs must be identical."
            exit 1
          fi

          if ! grep -Eq "^## $VERSION([[:space:]—]|$)" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a section for $VERSION."
            exit 1
          fi

      - name: Create tag and GitHub Release
        run: |
          gh release create "v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --generate-notes
